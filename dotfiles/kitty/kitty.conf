# ──────────────────────────────────────────────
# Kitty - Cyberpunk 2077 Theme
# ──────────────────────────────────────────────

font_family JetBrainsMono Nerd Font
font_size 13.0

background_opacity 0.78
window_padding_width 12

cursor_shape beam
cursor_blink_interval 0.5

confirm_os_window_close 0
hide_window_decorations yes

enable_audio_bell no
shell_integration enabled

# ──────────────────────────────────────────────
# Colors
# ──────────────────────────────────────────────

foreground              #F5F5F5
background              #050505

selection_foreground    #050505
selection_background    #00F5FF

cursor                  #FFD300
cursor_text_color       #050505

# ──────────────────────────────────────────────
# Tabs
# ──────────────────────────────────────────────

active_tab_foreground   #050505
active_tab_background   #00F5FF

inactive_tab_foreground #8E8E93
inactive_tab_background #141418

# ──────────────────────────────────────────────
# Normal Colors
# ──────────────────────────────────────────────

color0   #111114
color1   #FF0055
color2   #00FF87
color3   #FFD300
color4   #00F5FF
color5   #FF008C
color6   #62FCFF
color7   #F5F5F5

# ──────────────────────────────────────────────
# Bright Colors
# ──────────────────────────────────────────────

color8   #2A2A30
color9   #FF4D73
color10  #5CFFAE
color11  #FFE14A
color12  #5DFDFF
color13  #FF52B3
color14  #A8FFFF
color15  #FFFFFF

# ──────────────────────────────────────────────
# URL
# ──────────────────────────────────────────────

url_color #00F5FF

# ──────────────────────────────────────────────
# Border Colors
# ──────────────────────────────────────────────

active_border_color   #00F5FF
inactive_border_color #202028
bell_border_color     #FFD300

# ──────────────────────────────────────────────
# Window
# ──────────────────────────────────────────────

remember_window_size yes
initial_window_width 100c
initial_window_height 28c

# ──────────────────────────────────────────────
# Performance
# ──────────────────────────────────────────────

repaint_delay 10
input_delay 3
sync_to_monitor yes

# ──────────────────────────────────────────────
# Optional Cursor Trail
# ──────────────────────────────────────────────

cursor_trail 2
cursor_trail_decay 0.10 0.40
